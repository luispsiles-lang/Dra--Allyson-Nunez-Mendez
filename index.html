                                        key={sector}
                                        onClick={() => setActiveSector(sector)}
                                        className={`px-6 py-4 rounded-xl text-sm font-bold transition-all shadow-sm flex items-center gap-2 ${activeSector === sector ? 'bg-gradient-to-r from-violeta to-fucsia text-white shadow-md' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}
                                    >
                                        {sectorsData[sector].title}
                                    </button>
                                ))}
                            </div>

                            <div className="bg-slate-50 rounded-3xl p-8 md:p-12 border border-slate-100 shadow-xl max-w-5xl mx-auto">
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                                    <div className="lg:col-span-5 space-y-4">
                                        <div className="inline-flex p-4 bg-white rounded-2xl shadow-md">
                                            {sectorsData[activeSector].icon}
                                        </div>
                                        <h3 className="text-2xl font-extrabold text-violeta">{sectorsData[activeSector].title}</h3>
                                        <p className="text-slate-600 font-medium text-sm leading-relaxed">{sectorsData[activeSector].subtitle}</p>
                                    </div>
                                    <div className="lg:col-span-7 space-y-4">
                                        {sectorsData[activeSector].proposals.map((prop, idx) => (
                                            <div key={idx} className="flex items-start gap-3 bg-white p-4 rounded-xl border shadow-sm">
                                                <CheckIcon />
                                                <p className="text-xs sm:text-sm font-medium text-slate-700 leading-relaxed">{prop}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>


                    {/* BUSCADOR DE PROPUESTAS */}
                    <section id="plan" className="py-20 bg-white px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center max-w-3xl mx-auto space-y-4 mb-12">
                                <h2 className="text-3xl sm:text-4xl font-extrabold">Explora el <span className="text-violeta">Plan de Trabajo</span></h2>
                                <div className="relative max-w-lg mx-auto pt-4">
                                    <input
                                        type="text"
                                        placeholder="Buscar temas (ej: 'salario', 'becas')..."
                                        value={proposalSearch}
                                        onChange={(e) => setProposalSearch(e.target.value)}
                                        className="block w-full pl-6 pr-4 py-3.5 border border-slate-200 rounded-2xl bg-slate-50 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-fucsia/30"
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
                                {filteredEjes.map((item, idx) => (
                                    <div key={idx} className="bg-slate-50 rounded-2xl p-6 border shadow-sm hover:shadow-md transition-all">
                                        <span className="text-[10px] font-black uppercase text-fucsia bg-pink-100 px-2.5 py-1 rounded-full">{item.categoria}</span>
                                        <h3 className="text-base font-bold text-violeta mt-3 mb-2">{item.eje}</h3>
                                        <p className="text-xs text-slate-600 leading-relaxed">{item.descripcion}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BUZÓN COMUNITARIO */}
                    <section id="buzon" className="py-20 bg-slate-50 border-t px-6">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-12 gap-12 items-start max-w-6xl">
                            <div className="md:col-span-5 bg-white p-8 rounded-3xl border shadow-xl space-y-4">
                                <h3 className="text-2xl font-extrabold text-violeta">Tu Voz en el Consejo</h3>
                                <form onSubmit={handleProposalSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Nombre o Iniciales</label>
                                        <input type="text" value={formName} onChange={(e) => setFormName(e.target.value)} placeholder="Ej: Carlos B." className="w-full px-4 py-3 border rounded-xl text-sm" required />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Tu Sector</label>
                                        <select value={formSector} onChange={(e) => setFormSector(e.target.value)} className="w-full px-4 py-3 border rounded-xl text-sm bg-slate-50 text-slate-700">
                                            <option value="Estudiante">Estudiante</option>
                                            <option value="Docente">Docente</option>
                                            <option value="Administrativo">Personal Administrativo</option>
                                            <option value="Sede Universitaria">Sedes / Territorio</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Propuesta</label>
                                        <textarea value={formMessage} onChange={(e) => setFormMessage(e.target.value)} rows="3" placeholder="Escribe tu idea para mejorar la UNED..." className="w-full px-4 py-3 border rounded-xl text-sm" required></textarea>
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-violeta to-fucsia text-white py-3.5 rounded-xl font-bold">Enviar Propuesta</button>
                                    {submitNotification && <p className="text-xs font-bold text-emerald-600 bg-emerald-50 p-3 rounded-lg">{submitNotification}</p>}
                                </form>
                            </div>
                            <div className="md:col-span-7 space-y-4">
                                <h4 className="text-base font-extrabold text-slate-800">Ideas de la Comunidad ({proposals.length})</h4>
                                <div className="space-y-3 max-h-[400px] overflow-y-auto">
                                    {proposals.map(p => (
                                        <div key={p.id} className="bg-white p-5 rounded-2xl border shadow-sm space-y-2">
                                            <div className="flex justify-between text-xs text-slate-500">
                                                <span className="font-bold">{p.autor}</span>
                                                <span>{p.fecha}</span>
                                            </div>
                                            <p className="text-xs italic text-slate-600">"{p.mensaje}"</p>
                                            <div className="flex justify-between items-center pt-2">
                                                <span className="text-[10px] font-black uppercase text-fucsia bg-pink-50 px-2 py-0.5 rounded">{p.sector}</span>
                                                <button onClick={() => handleVote(p.id)} className="text-xs text-slate-600 hover:text-fucsia font-bold">❤️ {p.votos}</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACTO */}
                    <section id="contacto" className="py-20 bg-white px-6">
                        <div className="max-w-7xl mx-auto bg-gradient-to-br from-violeta to-indigo-950 text-white rounded-3xl p-8 md:p-12 max-w-5xl shadow-2xl relative overflow-hidden">
                            <div className="grid md:grid-cols-2 gap-10 items-center">
                                <div className="space-y-4">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-pink-300 bg-white/15 px-3 py-1 rounded-full inline-block">Seamos Multiplicadores</span>
                                    <h3 className="text-2xl sm:text-3xl font-extrabold">Llevemos la propuesta a cada rincón de la UNED</h3>
                                    <p className="text-sm text-purple-100 font-light">Comparte este sitio oficial por WhatsApp con tus compañeros de cátedra, grupos estudiantiles o redes de graduados.</p>
                                    <div className="flex flex-wrap gap-3">
                                        <button onClick={handleCopyLink} className="bg-fucsia px-5 py-3 rounded-xl font-bold text-xs">{copiedLink ? '¡Enlace copiado!' : 'Copiar enlace oficial'}</button>
                                    </div>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md p-6 rounded-2xl border border-white/15 space-y-3 text-sm">
                                    <h4 className="font-bold text-white">Contacto Directo con Allyson</h4>
                                    <p className="text-xs text-purple-200">Correo: <a href="mailto:anunez@uned.ac.cr" className="font-bold text-white hover:underline">anunez@uned.ac.cr</a></p>
                                    <p className="text-xs text-purple-200">Teléfono: <a href="tel:83740894" className="font-bold text-white">8374-0894</a></p>
                                    <p className="text-xs text-purple-200">Sede: <span className="font-bold text-white">Sede Central UNED, Cátedra de Historia</span></p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 text-slate-400 py-12 text-center">
                        <img src="logotipo.png" alt="Logo" className="w-16 h-16 mx-auto mb-4 rounded-full" />
                        <p className="font-bold text-white">Dra. Allyson Núñez Méndez</p>
                        <p className="text-xs opacity-50 mt-2">Tribunal Electoral Universitario (TEUNED). Período 2026-2031.</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
